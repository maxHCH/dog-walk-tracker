<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 品牌綠底（圓角） -->
  <rect width="512" height="512" rx="112" fill="#33BB92" />

  <!-- 用底色形狀裁切，讓腿延伸到頂部時仍保留圓角 -->
  <clipPath id="round">
    <rect width="512" height="512" rx="112" />
  </clipPath>

  <g clip-path="url(#round)">
    <!-- 咖啡色的腿＋腳掌（加粗，腿一路延伸到畫面頂端） -->
    <path fill="#C49A68" d="
      M186 0
      C184 90 180 200 176 296
      C172 326 132 340 132 382
      C132 424 162 450 226 456
      C236 458 246 458 256 458
      C266 458 276 458 286 456
      C326 450 354 424 354 382
      C354 338 320 326 316 296
      C312 200 308 90 306 0
      Z" />

    <!-- 咖啡斑紋（沿著腿分布） -->
    <g fill="#A87C49" opacity="0.55">
      <ellipse cx="232" cy="126" rx="20" ry="32" />
      <ellipse cx="288" cy="150" rx="16" ry="26" />
      <ellipse cx="234" cy="232" rx="14" ry="22" />
    </g>

    <!-- 白襪子（小腿下段＋腳掌）：外緣完全貼齊腿的腳掌輪廓，整個腳掌全白不留咖啡邊 -->
    <path fill="#F7F4EE" d="
      M176 296
      C206 284 236 290 256 291
      C276 290 306 284 316 296
      C320 326 354 338 354 382
      C354 424 326 450 286 456
      C276 458 266 458 256 458
      C246 458 236 458 226 456
      C162 450 132 424 132 382
      C132 340 172 326 176 296
      Z" />

    <!-- 腳趾分隔（淡淡幾道） -->
    <g stroke="#DACEBC" stroke-width="7" stroke-linecap="round" opacity="0.8" fill="none">
      <path d="M210 360 L208 412" />
      <path d="M256 364 L256 418" />
      <path d="M302 360 L304 412" />
    </g>
  </g>
</svg>
