<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 品牌綠底（更淺） -->
  <rect width="512" height="512" rx="112" fill="#33BB92"/>

  <!-- 用底色形狀裁切，讓腿延伸到頂部時仍保留圓角 -->
  <clipPath id="round">
    <rect width="512" height="512" rx="112"/>
  </clipPath>

  <g clip-path="url(#round)">
    <!-- 咖啡色的腿＋腳掌（加粗，腿一路延伸到畫面頂端） -->
    <path fill="#C49A68" d="
      M186 0
      C184 90 180 200 176 296
      C172 326 132 340 132 382
      C132 424 162 450 206 456
      C224 458 240 458 256 458
      C272 458 288 458 306 456
      C350 450 380 424 380 382
      C380 340 340 326 336 296
      C332 200 328 90 326 0
      Z"/>

    <!-- 咖啡斑紋（沿著腿分布） -->
    <g fill="#A87C49" opacity="0.55">
      <ellipse cx="232" cy="66" rx="20" ry="32"/>
      <ellipse cx="288" cy="150" rx="16" ry="26"/>
      <ellipse cx="234" cy="232" rx="14" ry="22"/>
    </g>

    <!-- 白襪子（小腿下段＋腳掌） -->
    <path fill="#F7F4EE" d="
      M176 300
      C198 286 232 292 256 294
      C280 292 314 286 336 300
      C340 326 380 340 380 382
      C380 424 350 450 306 456
      C288 458 272 458 256 458
      C240 458 224 458 206 456
      C162 450 132 424 132 382
      C132 340 174 326 176 300 Z"/>

    <!-- 腳趾分隔（淡淡幾道） -->
    <g stroke="#DACEBC" stroke-width="7" stroke-linecap="round" opacity="0.8" fill="none">
      <path d="M210 360 L208 412"/>
      <path d="M256 364 L256 418"/>
      <path d="M302 360 L304 412"/>
    </g>
  </g>
</svg>
